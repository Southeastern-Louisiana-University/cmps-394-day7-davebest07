version: '3.8'

networks:
  app_network:
    driver: bridge

services:
  db:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testdb
    # Port mapping commented out - database not exposed to host
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  api:
    build: ./api
    container_name: go_api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: testdb
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  ui:
    build: ./ui
    container_name: nginx_ui
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - app_network

volumes:
  postgres_data:
